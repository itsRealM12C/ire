<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <title>IR Extractor</title>
    <style>
        /* CSS Variables for Light/Dark Mode toggling */
        :root {
            --bg-color: #111;
            --text-color: #bbb;
            --border-color: #444;
            --btn-bg: #bbb;
            --btn-text: #000;
            --log-bg: #000;
            --btn-hover: #fff;
            --target-color: red;
        }

        [data-theme="light"] {
            --bg-color: #e0e0e0;
            --text-color: #111;
            --border-color: #333;
            --btn-bg: #333;
            --btn-text: #fff;
            --log-bg: #fff;
            --btn-hover: #555;
            --target-color: #0f0f0f;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Comfortaa', Comfortaa; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .video-container { position: relative; display: inline-block; margin-top: 10px; }
        video { 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            background: #000;
        }
        .mirrored {
            transform: scaleX(-1);
        }
        .target {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-top: -10px;
            margin-left: -10px;
            border: 2px solid var(--target-color);
            box-sizing: border-box;
            pointer-events: none;
        }
        canvas { display: none; }
        #log { 
            background: var(--log-bg); 
            padding: 15px; 
            border: 1px solid var(--border-color); 
            height: 250px; 
            overflow-y: auto; 
            text-align: left; 
            word-break: break-all; 
            margin-top: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            line-height: 1.5;
            transition: background-color 0.3s;
        }
        .controls-container {
            margin: 20px auto; 
            border: 1px dashed var(--border-color); 
            padding: 15px; 
            display: inline-block;
            max-width: 700px;
        }
        .controls-row {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .controls-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(100, 100, 100, 0.05);
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        [data-theme="light"] .controls-group {
            background: rgba(0, 0, 0, 0.05);
        }
        button, select { 
            background: var(--btn-bg); 
            color: var(--btn-text); 
            font-weight: bold; 
            padding: 10px 15px; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px;
            font-family: 'Comfortaa', Comfortaa; 
            transition: background-color 0.2s;
        }
        button:hover, select:hover { background: var(--btn-hover); }
        button:disabled { background: #777; color: #ccc; cursor: not-allowed; }
        
        .special-btn { background: #d00; color: #fff; }
        .special-btn:hover { background: #ddd; }
        
        /* Custom Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 150px;
            height: 10px;
            border-radius: 5px;
            outline: none;
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 20px;
            background: var(--btn-bg);
            cursor: pointer;
            border-radius: 3px;
        }
        /* The Threshold Gradient */
        #thresholdSlider {
            background: linear-gradient(to right, #000000, #ffffff);
        }
        /* The Speed Slider */
        #speedSlider {
            background: #333;
        }
        
        .audio-status { font-size: 12px; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>

    <h2>IR Extractor</h2>
    <p>Extract the IR using camera</p>

    <div class="video-container">
        <video id="cameraFeed" width="320" height="240" autoplay playsinline></video>
        <div class="target"></div>
    </div>
    
    <canvas id="processor" width="320" height="240"></canvas>

    <div class="controls-container">
        <div class="controls-row">
            <div class="controls-group">
                <label for="speedSlider"><strong>IR Speed Delay: </strong><span id="speedVal">0ms (Max)</span></label>
                <input type="range" id="speedSlider" min="0" max="1000" step="10" value="0">
            </div>
            
            <div class="controls-group">
                <label for="thresholdSlider"><strong>Threshold: </strong><span id="thresholdVal">200</span></label>
                <input type="range" id="thresholdSlider" min="0" max="255" value="200">
            </div>
        </div>

        <div class="controls-row">
            <button id="themeBtn">L/D Mode: Dark</button>
            <label for="displayMode"><strong>Format: </strong></label>
            <select id="displayMode">
                <option value="raw">Raw Binary (0/1)</option>
                <option value="block">Visual Blocks (░/█)</option>
                <option value="decode">Auto-Decode (8-bit ASCII)</option>
            </select>
        </div>

        <div class="controls-row">
            <button id="startCamBtn">Init Camera</button>
            <button id="fbBtn" disabled>F/B Cam: Back</button>
            <button id="flipBtn">Mirror View</button>
        </div>

        <div class="controls-row">
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="clearBtn">Clear Memory</button>
            <button id="saveBtn">Save to File</button>
        </div>
        
        <div class="audio-status">Square wave audio engine engages on recording.</div>
    </div>

    <h3>Data Stream (Memory):</h3>
    <div id="log"></div>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('processor');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const log = document.getElementById('log');
        
        const themeBtn = document.getElementById('themeBtn');
        const displayMode = document.getElementById('displayMode');
        const startCamBtn = document.getElementById('startCamBtn');
        const fbBtn = document.getElementById('fbBtn');
        const flipBtn = document.getElementById('flipBtn');
        const recordBtn = document.getElementById('recordBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdVal = document.getElementById('thresholdVal');

        let stream = null;
        let recording = false;
        let animationFrameId = null;
        let currentFacingMode = "environment"; 
        let isDarkMode = true;
        
        let audioCtx = null;
        let bitBuffer = ""; 
        
        // Tunable parameters
        let THRESHOLD = parseInt(thresholdSlider.value); 
        let captureDelay = parseInt(speedSlider.value); // ms
        let lastCaptureTime = 0;

        // --- Live Sliders ---
        speedSlider.addEventListener('input', (e) => {
            captureDelay = parseInt(e.target.value);
            speedVal.innerText = captureDelay === 0 ? "0ms (Max)" : `${captureDelay}ms`;
        });

        thresholdSlider.addEventListener('input', (e) => {
            THRESHOLD = parseInt(e.target.value);
            thresholdVal.innerText = THRESHOLD;
        });

        // --- Theme Toggle ---
        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = "L/D Mode: Dark";
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeBtn.innerText = "L/D Mode: Light";
            }
        });

        // --- Audio Engine ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(bit) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square'; 

            if (bit === "1") {
                oscillator.frequency.value = 1200; 
            } else {
                oscillator.frequency.value = 400;  
            }

            const duration = 0.03; 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // --- Camera Engine ---
        async function startCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode } 
                });
                video.srcObject = stream;
                
                recordBtn.disabled = false;
                fbBtn.disabled = false;
                startCamBtn.innerText = "Restart Camera";
            } catch (err) {
                alert("Camera Error: " + err.message + "\nYour device might not support this camera mode.");
            }
        }

        startCamBtn.addEventListener('click', startCamera);

        fbBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            fbBtn.innerText = (currentFacingMode === "environment") ? "F/B Cam: Back" : "F/B Cam: Front";
            startCamera();
        });

        flipBtn.addEventListener('click', () => {
            video.classList.toggle('mirrored');
        });

        // --- Recording & Processing ---
        recordBtn.addEventListener('click', () => {
            initAudio(); 

            if (!recording) {
                recording = true;
                bitBuffer = ""; 
                recordBtn.innerText = "Stop Recording";
                recordBtn.classList.add('special-btn');
                lastCaptureTime = performance.now();
                animationFrameId = requestAnimationFrame(captureFrame);
            } else {
                recording = false;
                recordBtn.innerText = "Start Recording";
                recordBtn.classList.remove('special-btn');
                cancelAnimationFrame(animationFrameId);
            }
        });

        clearBtn.addEventListener('click', () => {
            log.innerText = "";
            bitBuffer = "";
        });

        // Save Memory Feature
        saveBtn.addEventListener('click', () => {
            const memoryData = log.innerText; 
            
            if (memoryData.length === 0) {
                alert("Memory is empty! Record some data first.");
                return;
            }

            const unixTime = Math.floor(Date.now() / 1000);
            const fileName = `ir${unixTime}.txt`;

            const blob = new Blob([memoryData], { type: "text/plain" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            
            a.click();

            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        displayMode.addEventListener('change', () => {
            bitBuffer = ""; 
        });

        // --- Core Loop ---
        function captureFrame(timestamp) {
            if (!recording) return;

            // Throttle sampling based on Speed Delay slider
            if (timestamp - lastCaptureTime >= captureDelay) {
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const centerX = (canvas.width / 2) - 5;
                const centerY = (canvas.height / 2) - 5;
                const frameData = ctx.getImageData(centerX, centerY, 10, 10);
                const data = frameData.data;

                let totalBrightness = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const brightness = (0.299 * r + 0.587 * g + 0.114 * b);
                    totalBrightness += brightness;
                }

                const avgBrightness = totalBrightness / (data.length / 4);
                
                // Dynamic Threshold comparison
                const bit = (avgBrightness >= THRESHOLD) ? "1" : "0";
                
                playBeep(bit);

                const mode = displayMode.value;

                if (mode === "raw") {
                    log.innerHTML += bit;
                } 
                else if (mode === "block") {
                    log.innerHTML += (bit === "1") ? "█" : "░";
                } 
                else if (mode === "decode") {
                    bitBuffer += bit;
                    if (bitBuffer.length === 8) {
                        const charCode = parseInt(bitBuffer, 2);
                        
                        if (charCode >= 32 && charCode <= 126) {
                            const textNode = document.createTextNode(String.fromCharCode(charCode));
                            log.appendChild(textNode);
                        } else {
                            log.innerHTML += "."; 
                        }
                        bitBuffer = ""; 
                    }
                }

                log.scrollTop = log.scrollHeight;
                lastCaptureTime = timestamp;
            }

            animationFrameId = requestAnimationFrame(captureFrame);
        }
    </script>
<h5><font color="#121212">(Microphone isn't IR by the way)</font></h5>
</body>
</html>

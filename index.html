<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Signal Analyzer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --border-color: #64748b; /* Modern Slate Gray */
            --btn-bg: #64748b;
            --btn-text: #ffffff;
            --log-bg: #111111;
            --btn-hover: #475569;
            --target-color: #ef4444;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --text-color: #1e293b;
            --border-color: #94a3b8;
            --btn-bg: #475569;
            --btn-text: #ffffff;
            --log-bg: #ffffff;
            --btn-hover: #334155;
            --target-color: #dc2626;
        }

        /* Prevent default browser selection highlights and add transparent tap highlight */
        *, *::before, *::after {
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
            -webkit-touch-callout: none;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Comfortaa', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-weight: 600; }
        .video-container { position: relative; display: inline-block; margin-top: 10px; }
        video { 
            border: 2px solid var(--border-color); 
            border-radius: 12px; 
            background: #000;
        }
        .mirrored { transform: scaleX(-1); }
        .target {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; margin-top: -10px; margin-left: -10px;
            border: 2px solid var(--target-color); box-sizing: border-box; pointer-events: none;
            border-radius: 4px;
        }
        canvas { display: none; }
        #log { 
            background: var(--log-bg); padding: 15px; border: 1px solid var(--border-color); 
            height: 250px; overflow-y: auto; text-align: left; word-break: break-all; 
            margin-top: 20px; font-size: 14px; letter-spacing: 1px; line-height: 1.6;
            border-radius: 8px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }
        .controls-container {
            margin: 20px auto; border: 1px dashed var(--border-color); padding: 20px; 
            display: inline-block; max-width: 850px; border-radius: 12px;
        }
        .controls-row {
            margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; align-items: center;
        }
        .controls-group {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(100, 116, 139, 0.1); padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 8px;
        }
        
        button, select { 
            background: var(--btn-bg); color: var(--btn-text); font-weight: 500; 
            padding: 10px 18px; border: none; cursor: pointer; border-radius: 8px;
            font-family: 'Comfortaa', sans-serif; transition: background-color 0.2s, transform 0.1s;
            outline: none;
        }
        button:hover, select:hover { background: var(--btn-hover); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #64748b; opacity: 0.4; cursor: not-allowed; }
        
        .special-btn { background: #dc2626; color: #fff; }
        .special-btn:hover { background: #b91c1c; }
        .export-btn { background: #2563eb; color: #fff; }
        .export-btn:hover { background: #1d4ed8; }
        .map-btn { background: #ea580c; color: #fff; }
        .map-btn:hover { background: #c2410c; }

        input[type="range"] {
            -webkit-appearance: none; width: 140px; height: 8px; border-radius: 5px; outline: none; 
            margin-top: 8px; border: 1px solid var(--border-color); background: #334155;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; 
            background: var(--text-color); cursor: pointer; border-radius: 50%;
        }
        #thresholdSlider { background: linear-gradient(to right, #000000, #ffffff); }
        .status-text { font-size: 12px; margin-top: 10px; opacity: 0.7; }
        #keymapStatus { color: #f59e0b; font-weight: 500; margin-left: 10px; }
        #liveColor { font-weight: bold; margin-left: 10px; color: var(--text-color); }
        
        #renderOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; color: #fff;
        }
    </style>
</head>
<body>

    <div id="renderOverlay">
        <h2>Rendering File...</h2>
        <p>Please wait.</p>
    </div>

    <h2>Optical Signal Analyzer Pro</h2>
    <p>Targeted Chromatic IR Pulse Decoder (Rejects White Flashlights)</p>

    <div class="video-container">
        <video id="cameraFeed" width="320" height="240" autoplay playsinline muted></video>
        <div class="target"></div>
    </div>
    
    <canvas id="processor" width="320" height="240"></canvas>

    <div class="controls-container">
        <div class="controls-row">
            <div class="controls-group">
                <label for="speedSlider"><strong>IR Speed Delay: </strong><span id="speedVal">50ms</span></label>
                <input id="speedSlider" type="range" min="0" max="1000" step="10" value="50">
            </div>
            <div class="controls-group">
                <label for="thresholdSlider"><strong>Min IR Intensity (R): </strong><span id="thresholdVal">160</span></label>
                <input id="thresholdSlider" type="range" min="0" max="255" value="160">
            </div>
        </div>

        <div class="controls-row" style="border: 1px dashed rgba(100,116,139,0.4); padding: 12px; border-radius: 8px;">
            <div class="controls-group">
                <label for="waveType"><strong>0/1 Waveform</strong></label>
                <select id="waveType" style="padding: 4px 8px; margin-top: 5px; font-size: 12px;">
                    <option value="sine">Sine (Smooth)</option>
                    <option value="square">Square (Retro)</option>
                    <option value="sawtooth">Sawtooth (Bright)</option>
                    <option value="triangle">Triangle (Warm)</option>
                </select>
            </div>
            <div class="controls-group">
                <label for="freq0Slider"><strong>Bit 0 Freq: </strong><span id="freq0Val">330Hz</span></label>
                <input id="freq0Slider" type="range" min="100" max="2000" step="10" value="330">
            </div>
            <div class="controls-group">
                <label for="freq1Slider"><strong>Bit 1 Freq: </strong><span id="freq1Val">880Hz</span></label>
                <input id="freq1Slider" type="range" min="100" max="3000" step="10" value="880">
            </div>
            <div class="controls-group">
                <label for="volumeSlider"><strong>Synth Vol: </strong><span id="volumeVal">30%</span></label>
                <input id="volumeSlider" type="range" min="0" max="100" step="5" value="30">
            </div>
        </div>

        <div class="controls-row">
            <button id="themeBtn">L/D Mode: Dark</button>
            <label for="displayMode"><strong>Format: </strong></label>
            <select id="displayMode">
                <option value="raw">Raw Binary (0/1)</option>
                <option value="block">Visual Blocks (░/█)</option>
                <option value="decode">ASCII (8-bit)</option>
                <option value="hex">Hexadecimal (8-bit)</option>
                <option value="dec">Decimal (8-bit)</option>
                <option value="keymap">Keymap Decoder (16-bit)</option>
            </select>
            <span id="liveColor">HEX: #000000</span>
        </div>

        <div class="controls-row">
            <button id="startCamBtn">Init Camera</button>
            <button id="fbBtn" disabled>F/B Cam: Back</button>
            <button id="flipBtn">Mirror View</button>
            <input type="file" id="keymapFile" accept=".txt" style="display:none;">
            <button id="loadKeymapBtn" class="map-btn">Manual Map Load</button>
            <span id="keymapStatus">Looking for keymap.txt...</span>
        </div>

        <div class="controls-row">
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="clearBtn">Clear Memory</button>
            <button id="saveBtn">Save to TXT</button>
            <button id="wavBtn" class="export-btn">Convert IR as WAV</button>
            <button id="vidBtn" class="export-btn">Convert IR as MP4</button>
        </div>
        
        <div id="runtimeStatus" class="status-text">Pipeline configured. Synth control module loaded.</div>
    </div>

    <h3>Data Stream (Memory):</h3>
    <div id="log"></div>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('processor');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const log = document.getElementById('log');
        
        const themeBtn = document.getElementById('themeBtn');
        const displayMode = document.getElementById('displayMode');
        const startCamBtn = document.getElementById('startCamBtn');
        const fbBtn = document.getElementById('fbBtn');
        const flipBtn = document.getElementById('flipBtn');
        const recordBtn = document.getElementById('recordBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const wavBtn = document.getElementById('wavBtn');
        const vidBtn = document.getElementById('vidBtn');
        
        const keymapFile = document.getElementById('keymapFile');
        const loadKeymapBtn = document.getElementById('loadKeymapBtn');
        const keymapStatus = document.getElementById('keymapStatus');
        const liveColor = document.getElementById('liveColor');
        const runtimeStatus = document.getElementById('runtimeStatus');
        
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdVal = document.getElementById('thresholdVal');
        const renderOverlay = document.getElementById('renderOverlay');

        // Synth control bindings
        const waveType = document.getElementById('waveType');
        const freq0Slider = document.getElementById('freq0Slider');
        const freq0Val = document.getElementById('freq0Val');
        const freq1Slider = document.getElementById('freq1Slider');
        const freq1Val = document.getElementById('freq1Val');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeVal = document.getElementById('volumeVal');

        let stream = null;
        let recording = false;
        let animationFrameId = null;
        let currentFacingMode = "environment"; 
        let isDarkMode = true;
        
        let audioCtx = null;
        let bitBuffer = ""; 
        let fullMemoryBuffer = ""; 
        
        let MIN_RED_INTENSITY = parseInt(thresholdSlider.value); 
        let captureDelay = parseInt(speedSlider.value); 
        let lastCaptureTime = 0;
        
        let customKeymap = {};

        // --- Auto-Load Keymap ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('keymap.txt');
                if (!response.ok) throw new Error("File not found.");
                const text = await response.text();
                parseKeymapText(text);
            } catch (err) {
                keymapStatus.innerText = "No auto-map found. Use Manual Load.";
                keymapStatus.style.color = "#888";
            }
        });

        // --- Manual Load Fallback ---
        loadKeymapBtn.addEventListener('click', () => { keymapFile.click(); });
        keymapFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                parseKeymapText(e.target.result);
                keymapFile.value = ''; 
            };
            reader.readAsText(file);
        });

        function parseKeymapText(text) {
            const lines = text.split('\n');
            let count = 0;
            customKeymap = {};
            
            for (let line of lines) {
                if (line.includes('│')) {
                    let parts = line.split('│');
                    if (parts.length >= 4 && !line.includes('Key name')) {
                        let keyName = parts[1].trim();
                        let keyDecStr = parts[3].trim();
                        let keyDec = parseInt(keyDecStr, 10);
                        
                        if (!isNaN(keyDec)) {
                            customKeymap[keyDec] = keyName;
                            count++;
                        }
                    }
                }
            }
            
            if (count > 0) {
                displayMode.value = "keymap"; 
                keymapStatus.innerText = `[ Active: ${count} Keys ]`;
                keymapStatus.style.color = "var(--border-color)";
            } else {
                keymapStatus.innerText = "Error: Invalid map format.";
                keymapStatus.style.color = "#ef4444";
            }
        }

        // --- Controls Event Listeners ---
        speedSlider.addEventListener('input', (e) => {
            captureDelay = parseInt(e.target.value);
            speedVal.innerText = captureDelay === 0 ? "0ms (Max)" : `${captureDelay}ms`;
        });

        thresholdSlider.addEventListener('input', (e) => {
            MIN_RED_INTENSITY = parseInt(e.target.value);
            thresholdVal.innerText = MIN_RED_INTENSITY;
        });

        freq0Slider.addEventListener('input', (e) => { freq0Val.innerText = `${e.target.value}Hz`; });
        freq1Slider.addEventListener('input', (e) => { freq1Val.innerText = `${e.target.value}Hz`; });
        volumeSlider.addEventListener('input', (e) => { volumeVal.innerText = `${e.target.value}%`; });

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = "L/D Mode: Dark";
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeBtn.innerText = "L/D Mode: Light";
            }
        });

        displayMode.addEventListener('change', () => { bitBuffer = ""; });

        // --- Secure Isolated Camera Hook ---
        async function startCamera() {
            runtimeStatus.innerText = "Initializing user media pipeline...";
            runtimeStatus.style.color = "var(--text-color)";

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            const cleanVideoConstraints = [
                { video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false },
                { video: { facingMode: currentFacingMode }, audio: false },
                { video: true, audio: false }
            ];

            let success = false;
            for (let constraints of cleanVideoConstraints) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    await video.play();
                    
                    recordBtn.disabled = false;
                    fbBtn.disabled = false;
                    startCamBtn.innerText = "Restart Camera";
                    runtimeStatus.innerText = "Camera linked successfully. Frame capture ready.";
                    success = true;
                    break;
                } catch (err) {
                    console.warn("Media constraints profile failed, shifting...", err);
                }
            }

            if (!success) {
                runtimeStatus.innerText = "Initialization failed. Secure domain (HTTPS/Localhost) needed.";
                runtimeStatus.style.color = "#ef4444";
                alert("Camera Access Error: Ensure site security flags permit video. Audio is locked down.");
            }
        }
        
        startCamBtn.addEventListener('click', startCamera);
        fbBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            fbBtn.innerText = (currentFacingMode === "environment") ? "F/B Cam: Back" : "F/B Cam: Front";
            startCamera();
        });
        flipBtn.addEventListener('click', () => { video.classList.toggle('mirrored'); });

        // --- Customizable Instruments Sound Engine ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSmoothSound(bit) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            const targetVolume = parseInt(volumeSlider.value) / 100;
            if (targetVolume === 0) return; // Muted

            const now = audioCtx.currentTime;
            const instrumentType = waveType.value;
            
            if (bit === "0") {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = instrumentType;
                osc.frequency.setValueAtTime(parseInt(freq0Slider.value), now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(targetVolume * 0.15, now + 0.002);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);
                
                osc.start(now);
                osc.stop(now + 0.022);
            } else {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc1.type = instrumentType;
                const baseFreq1 = parseInt(freq1Slider.value);
                osc1.frequency.setValueAtTime(baseFreq1, now);
                
                // Keep the dual-harmonic overtone stylization for crispness on Bit 1
                osc2.type = instrumentType;
                osc2.frequency.setValueAtTime(baseFreq1 * 2, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(targetVolume * 0.18, now + 0.003);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.035);
                
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 0.037);
                osc2.stop(now + 0.037);
            }
        }

        // --- Core Capture Loop ---
        recordBtn.addEventListener('click', () => {
            initAudio(); 
            if (!recording) {
                recording = true;
                bitBuffer = ""; 
                recordBtn.innerText = "Stop Recording";
                recordBtn.classList.add('special-btn');
                lastCaptureTime = performance.now();
                animationFrameId = requestAnimationFrame(captureFrame);
            } else {
                recording = false;
                recordBtn.innerText = "Start Recording";
                recordBtn.classList.remove('special-btn');
                cancelAnimationFrame(animationFrameId);
            }
        });

        clearBtn.addEventListener('click', () => {
            log.innerText = "";
            fullMemoryBuffer = "";
            bitBuffer = "";
        });

        function captureFrame(timestamp) {
            if (!recording) return;

            if (timestamp - lastCaptureTime >= captureDelay) {
                try {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const size = 6;
                    const startX = (canvas.width / 2) - size;
                    const startY = (canvas.height / 2) - size;
                    const imgData = ctx.getImageData(startX, startY, size * 2, size * 2).data;
                    
                    let rSum = 0, gSum = 0, bSum = 0;
                    let count = 0;
                    
                    for (let i = 0; i < imgData.length; i += 4) {
                        rSum += imgData[i];
                        gSum += imgData[i+1];
                        bSum += imgData[i+2];
                        count++;
                    }
                    
                    let avgR = Math.floor(rSum / count);
                    let avgG = Math.floor(gSum / count);
                    let avgB = Math.floor(bSum / count);
                    
                    let hexStr = "#" + ((1 << 24) + (avgR << 16) + (avgG << 8) + avgB).toString(16).slice(1).toUpperCase();
                    liveColor.innerText = `HEX: ${hexStr}`;

                    let isIR = (avgR >= MIN_RED_INTENSITY) && (avgB > 100) && (avgG < (avgR * 0.75)) && (avgG < (avgB * 0.85));
                    
                    const bit = isIR ? "1" : "0";
                    fullMemoryBuffer += bit;
                    playSmoothSound(bit);

                    const mode = displayMode.value;
                    if (mode === "raw") {
                        log.innerHTML += bit;
                    } else if (mode === "block") {
                        log.innerHTML += (bit === "1") ? "█" : "░";
                    } else if (mode === "keymap") {
                        bitBuffer += bit;
                        if (bitBuffer.length === 16) {
                            const charCode = parseInt(bitBuffer, 2);
                            const matchedKey = customKeymap[charCode];
                            
                            if (matchedKey) {
                                log.innerHTML += `<span style="color:#fff; background:var(--btn-bg); padding:2px 6px; margin:2px; border-radius:4px; font-size:12px;">[${matchedKey}]</span> `;
                            } else {
                                log.innerHTML += `<span style="color:#64748b; font-size:12px;">[UNK:${charCode}]</span> `;
                            }
                            bitBuffer = ""; 
                        }
                    } else {
                        bitBuffer += bit;
                        if (bitBuffer.length === 8) {
                            const charCode = parseInt(bitBuffer, 2);
                            if (mode === "decode") {
                                log.appendChild(document.createTextNode((charCode >= 32 && charCode <= 126) ? String.fromCharCode(charCode) : "."));
                            } else if (mode === "hex") {
                                log.innerHTML += charCode.toString(16).toUpperCase().padStart(2, '0') + " ";
                            } else if (mode === "dec") {
                                log.innerHTML += charCode.toString(10) + " ";
                            }
                            bitBuffer = ""; 
                        }
                    }
                    log.scrollTop = log.scrollHeight;
                } catch (e) {
                    console.error("Frame parsing dropped structural error: ", e);
                }
                lastCaptureTime = timestamp;
            }
            animationFrameId = requestAnimationFrame(captureFrame);
        }

        // --- Export Text ---
        saveBtn.addEventListener('click', () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            let outputText = "";
            const mode = displayMode.value;

            if (mode === "block") {
                for (let i = 0; i < fullMemoryBuffer.length; i++) {
                    outputText += (fullMemoryBuffer[i] === "1") ? "█" : "░";
                }
            } else if (mode === "keymap") {
                for (let i = 0; i < fullMemoryBuffer.length; i += 16) {
                    let byteStr = fullMemoryBuffer.substring(i, i + 16);
                    if (byteStr.length === 16) {
                        let charCode = parseInt(byteStr, 2);
                        let matchedKey = customKeymap[charCode];
                        outputText += matchedKey ? `[${matchedKey}] ` : `[UNK:${charCode}] `;
                    }
                }
            } else if (mode === "hex" || mode === "dec" || mode === "decode") {
                for (let i = 0; i < fullMemoryBuffer.length; i += 8) {
                    let byteStr = fullMemoryBuffer.substring(i, i + 8);
                    if (byteStr.length === 8) {
                        let charCode = parseInt(byteStr, 2);
                        if (mode === "hex") {
                            outputText += charCode.toString(16).toUpperCase().padStart(2, '0') + " ";
                        } else if (mode === "dec") {
                            outputText += charCode.toString(10) + " ";
                        } else if (mode === "decode") {
                            outputText += (charCode >= 32 && charCode <= 126) ? String.fromCharCode(charCode) : ".";
                        }
                    }
                }
            } else {
                outputText = fullMemoryBuffer; 
            }

            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, outputText], { type: "text/plain;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `ir_capture_${Math.floor(Date.now()/1000)}.txt`;
            a.click();
        });

        // --- Export Custom Instrument Configuration WAV Generator ---
        wavBtn.addEventListener('click', () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            const sampleRate = 44100;
            const bitDurationMs = captureDelay > 0 ? captureDelay : 50; 
            const samplesPerBit = Math.floor(sampleRate * (bitDurationMs / 1000));
            const totalSamples = fullMemoryBuffer.length * samplesPerBit;
            const audioData = new Float32Array(totalSamples);

            const f0 = parseInt(freq0Slider.value);
            const f1 = parseInt(freq1Slider.value);
            const instr = waveType.value;

            // Simple synthesizer generator function for arrays based on waveform type
            const getWaveSample = (type, angle) => {
                if (type === 'square') return Math.sign(Math.sin(angle));
                if (type === 'sawtooth') return (angle % (2 * Math.PI)) / Math.PI - 1;
                if (type === 'triangle') return Math.abs((angle % (2 * Math.PI)) / Math.PI - 1) * 2 - 1;
                return Math.sin(angle); // Default: sine
            };

            for (let i = 0; i < fullMemoryBuffer.length; i++) {
                const bit = fullMemoryBuffer[i];
                const offset = i * samplesPerBit;
                
                if (bit === '0') {
                    const angularFreq = 2 * Math.PI * f0 / sampleRate;
                    for (let j = 0; j < samplesPerBit; j++) {
                        let envelope = (j < samplesPerBit * 0.1) ? (j / (samplesPerBit * 0.1)) : Math.max(0, 1 - (j / samplesPerBit));
                        audioData[offset + j] = getWaveSample(instr, angularFreq * j) * 0.15 * envelope;
                    }
                } else {
                    const angularFreq1 = 2 * Math.PI * f1 / sampleRate;
                    const angularFreq2 = 2 * Math.PI * (f1 * 2) / sampleRate;
                    for (let j = 0; j < samplesPerBit; j++) {
                        let envelope = (j < samplesPerBit * 0.1) ? (j / (samplesPerBit * 0.1)) : Math.max(0, 1 - (j / samplesPerBit));
                        let mixedValue = getWaveSample(instr, angularFreq1 * j) + getWaveSample(instr, angularFreq2 * j);
                        audioData[offset + j] = mixedValue * 0.1 * envelope;
                    }
                }
            }

            const buffer = new ArrayBuffer(44 + audioData.length * 2);
            const view = new DataView(buffer);
            
            const writeString = (v, offset, str) => {
                for (let i = 0; i < str.length; i++) v.setUint8(offset + i, str.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + audioData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, audioData.length * 2, true);

            let offset = 44;
            for (let i = 0; i < audioData.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, audioData[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            const blob = new Blob([view], { type: 'audio/wav' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `ir_${Math.floor(Date.now()/1000)}.wav`;
            a.click();
        });

        // --- Export Video Generator ---
        vidBtn.addEventListener('click', async () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            renderOverlay.style.display = 'flex';
            const bitDurationMs = captureDelay > 0 ? captureDelay : 50; 
            
            const offCanvas = document.createElement('canvas');
            offCanvas.width = 640;
            offCanvas.height = 480;
            const offCtx = offCanvas.getContext('2d');
            
            const renderStream = offCanvas.captureStream(30);
            const recorder = new MediaRecorder(renderStream, { mimeType: 'video/webm' });
            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `ir_flicker_${Math.floor(Date.now()/1000)}.mp4`;
                a.click();
                renderOverlay.style.display = 'none';
            };
            
            recorder.start();

            const drawFrame = (color) => {
                offCtx.fillStyle = color;
                offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
            };

            drawFrame('black');
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < fullMemoryBuffer.length; i++) {
                drawFrame(fullMemoryBuffer[i] === '1' ? 'white' : 'black');
                await new Promise(r => setTimeout(r, bitDurationMs));
            }

            drawFrame('black');
            await new Promise(r => setTimeout(r, 1000));

            recorder.stop();
        });

    </script>
</body>
</html>

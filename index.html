<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Signal Analyzer Pro</title>
    <style>
        :root {
            --bg-color: #111;
            --text-color: #0f0;
            --border-color: #0f0;
            --btn-bg: #0f0;
            --btn-text: #000;
            --log-bg: #000;
            --btn-hover: #fff;
            --target-color: red;
        }

        [data-theme="light"] {
            --bg-color: #e0e0e0;
            --text-color: #111;
            --border-color: #333;
            --btn-bg: #333;
            --btn-text: #fff;
            --log-bg: #fff;
            --btn-hover: #555;
            --target-color: #ff0000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .video-container { position: relative; display: inline-block; margin-top: 10px; }
        video { 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            background: #000;
        }
        .mirrored { transform: scaleX(-1); }
        .target {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; margin-top: -10px; margin-left: -10px;
            border: 2px solid var(--target-color); box-sizing: border-box; pointer-events: none;
        }
        canvas { display: none; }
        #log { 
            background: var(--log-bg); padding: 15px; border: 1px solid var(--border-color); 
            height: 250px; overflow-y: auto; text-align: left; word-break: break-all; 
            margin-top: 20px; font-size: 14px; letter-spacing: 2px; line-height: 1.5;
            transition: background-color 0.3s;
        }
        .controls-container {
            margin: 20px auto; border: 1px dashed var(--border-color); padding: 15px; 
            display: inline-block; max-width: 800px;
        }
        .controls-row {
            margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; align-items: center;
        }
        .controls-group {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0, 255, 0, 0.05); padding: 10px; border: 1px solid var(--border-color); border-radius: 4px;
        }
        [data-theme="light"] .controls-group { background: rgba(0, 0, 0, 0.05); }
        
        button, select { 
            background: var(--btn-bg); color: var(--btn-text); font-weight: bold; 
            padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px;
            font-family: 'Courier New', Courier, monospace; transition: background-color 0.2s;
        }
        button:hover, select:hover { background: var(--btn-hover); }
        button:disabled { background: #777; color: #ccc; cursor: not-allowed; }
        
        .special-btn { background: #d00; color: #fff; }
        .special-btn:hover { background: #f00; }
        .export-btn { background: #00f; color: #fff; }
        .export-btn:hover { background: #55f; }
        .map-btn { background: #f90; color: #000; }
        .map-btn:hover { background: #ffb; }

        input[type="range"] {
            -webkit-appearance: none; width: 150px; height: 10px; border-radius: 5px; outline: none; 
            margin-top: 5px; border: 1px solid var(--border-color);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 15px; height: 20px; 
            background: var(--btn-bg); cursor: pointer; border-radius: 3px;
        }
        #thresholdSlider { background: linear-gradient(to right, #000000, #ffffff); }
        #speedSlider { background: #333; }
        .status-text { font-size: 12px; margin-top: 10px; opacity: 0.8; }
        #keymapStatus { color: #ff0; font-weight: bold; margin-left: 10px; }
        
        #renderOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; color: #0f0;
        }
    </style>
</head>
<body>

    <div id="renderOverlay">
        <h2>Rendering File...</h2>
        <p>Please wait.</p>
    </div>

    <h2>Optical Signal Analyzer Pro</h2>
    <p>Capture, monitor, and decode optical pulses via hardware camera.</p>

    <div class="video-container">
        <video id="cameraFeed" width="320" height="240" autoplay playsinline></video>
        <div class="target"></div>
    </div>
    
    <canvas id="processor" width="320" height="240"></canvas>

    <div class="controls-container">
        <div class="controls-row">
            <div class="controls-group">
                <label for="speedSlider"><strong>IR Speed Delay: </strong><span id="speedVal">50ms</span></label>
                <input type="range" id="speedSlider" min="0" max="1000" step="10" value="50">
            </div>
            <div class="controls-group">
                <label for="thresholdSlider"><strong>Threshold: </strong><span id="thresholdVal">200</span></label>
                <input type="range" id="thresholdSlider" min="0" max="255" value="200">
            </div>
        </div>

        <div class="controls-row">
            <button id="themeBtn">L/D Mode: Dark</button>
            <label for="displayMode"><strong>Format: </strong></label>
            <select id="displayMode">
                <option value="raw">Raw Binary (0/1)</option>
                <option value="block">Visual Blocks (░/█)</option>
                <option value="decode">ASCII (8-bit)</option>
                <option value="hex">Hexadecimal (8-bit)</option>
                <option value="dec">Decimal (8-bit)</option>
                <option value="keymap">Keymap Decoder (16-bit)</option>
            </select>
        </div>

        <div class="controls-row">
            <button id="startCamBtn">Init Camera</button>
            <button id="fbBtn" disabled>F/B Cam: Back</button>
            <button id="flipBtn">Mirror View</button>
            <input type="file" id="keymapFile" accept=".txt" style="display:none;">
            <button id="loadKeymapBtn" class="map-btn">Manual Map Load</button>
            <span id="keymapStatus">Looking for keymap.txt...</span>
        </div>

        <div class="controls-row">
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="clearBtn">Clear Memory</button>
            <button id="saveBtn">Save to TXT</button>
            <button id="wavBtn" class="export-btn">Convert IR as WAV</button>
            <button id="vidBtn" class="export-btn">Convert IR as MP4</button>
        </div>
        
        <div class="status-text">Square wave audio engine engages on recording.</div>
    </div>

    <h3>Data Stream (Memory):</h3>
    <div id="log"></div>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('processor');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const log = document.getElementById('log');
        
        const themeBtn = document.getElementById('themeBtn');
        const displayMode = document.getElementById('displayMode');
        const startCamBtn = document.getElementById('startCamBtn');
        const fbBtn = document.getElementById('fbBtn');
        const flipBtn = document.getElementById('flipBtn');
        const recordBtn = document.getElementById('recordBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const wavBtn = document.getElementById('wavBtn');
        const vidBtn = document.getElementById('vidBtn');
        
        const keymapFile = document.getElementById('keymapFile');
        const loadKeymapBtn = document.getElementById('loadKeymapBtn');
        const keymapStatus = document.getElementById('keymapStatus');
        
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdVal = document.getElementById('thresholdVal');
        const renderOverlay = document.getElementById('renderOverlay');

        let stream = null;
        let recording = false;
        let animationFrameId = null;
        let currentFacingMode = "environment"; 
        let isDarkMode = true;
        
        let audioCtx = null;
        let bitBuffer = ""; 
        let fullMemoryBuffer = ""; 
        
        let THRESHOLD = parseInt(thresholdSlider.value); 
        let captureDelay = parseInt(speedSlider.value); 
        let lastCaptureTime = 0;
        
        let customKeymap = {};

        // --- Auto-Load Keymap ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('keymap.txt');
                if (!response.ok) throw new Error("File not found or access denied.");
                const text = await response.text();
                parseKeymapText(text);
            } catch (err) {
                keymapStatus.innerText = "No auto-map found. Use Manual Load.";
                keymapStatus.style.color = "#888";
                console.warn("Auto-load failed:", err);
            }
        });

        // --- Manual Load Fallback ---
        loadKeymapBtn.addEventListener('click', () => { keymapFile.click(); });
        keymapFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                parseKeymapText(e.target.result);
                keymapFile.value = ''; 
            };
            reader.readAsText(file);
        });

        function parseKeymapText(text) {
            const lines = text.split('\n');
            let count = 0;
            customKeymap = {};
            
            for (let line of lines) {
                if (line.includes('│')) {
                    let parts = line.split('│');
                    if (parts.length >= 4 && !line.includes('Key name')) {
                        let keyName = parts[1].trim();
                        let keyDecStr = parts[3].trim();
                        let keyDec = parseInt(keyDecStr, 10);
                        
                        if (!isNaN(keyDec)) {
                            customKeymap[keyDec] = keyName;
                            count++;
                        }
                    }
                }
            }
            
            if (count > 0) {
                displayMode.value = "keymap"; 
                keymapStatus.innerText = `[ Active: ${count} Keys ]`;
                keymapStatus.style.color = "#0f0";
            } else {
                keymapStatus.innerText = "Error: Invalid map format.";
                keymapStatus.style.color = "red";
            }
        }

        // --- Controls ---
        speedSlider.addEventListener('input', (e) => {
            captureDelay = parseInt(e.target.value);
            speedVal.innerText = captureDelay === 0 ? "0ms (Max)" : `${captureDelay}ms`;
        });

        thresholdSlider.addEventListener('input', (e) => {
            THRESHOLD = parseInt(e.target.value);
            thresholdVal.innerText = THRESHOLD;
        });

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = "L/D Mode: Dark";
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeBtn.innerText = "L/D Mode: Light";
            }
        });

        displayMode.addEventListener('change', () => { bitBuffer = ""; });

        // --- Camera System ---
        async function startCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
                video.srcObject = stream;
                recordBtn.disabled = false;
                fbBtn.disabled = false;
                startCamBtn.innerText = "Restart Camera";
            } catch (err) {
                alert("Camera Error: " + err.message);
            }
        }
        startCamBtn.addEventListener('click', startCamera);
        fbBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            fbBtn.innerText = (currentFacingMode === "environment") ? "F/B Cam: Back" : "F/B Cam: Front";
            startCamera();
        });
        flipBtn.addEventListener('click', () => { video.classList.toggle('mirrored'); });

        // --- Audio Beeps ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(bit) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square'; 
            oscillator.frequency.value = (bit === "1") ? 1200 : 400; 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.03);
        }

        // --- Core Capture Loop ---
        recordBtn.addEventListener('click', () => {
            initAudio(); 
            if (!recording) {
                recording = true;
                bitBuffer = ""; 
                recordBtn.innerText = "Stop Recording";
                recordBtn.classList.add('special-btn');
                lastCaptureTime = performance.now();
                animationFrameId = requestAnimationFrame(captureFrame);
            } else {
                recording = false;
                recordBtn.innerText = "Start Recording";
                recordBtn.classList.remove('special-btn');
                cancelAnimationFrame(animationFrameId);
            }
        });

        clearBtn.addEventListener('click', () => {
            log.innerText = "";
            fullMemoryBuffer = "";
            bitBuffer = "";
        });

        function captureFrame(timestamp) {
            if (!recording) return;

            if (timestamp - lastCaptureTime >= captureDelay) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData((canvas.width / 2) - 5, (canvas.height / 2) - 5, 10, 10).data;
                let totalBrightness = 0;
                for (let i = 0; i < data.length; i += 4) {
                    totalBrightness += (0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
                }
                
                const bit = (totalBrightness / (data.length / 4) >= THRESHOLD) ? "1" : "0";
                fullMemoryBuffer += bit;
                playBeep(bit);

                const mode = displayMode.value;
                if (mode === "raw") {
                    log.innerHTML += bit;
                } else if (mode === "block") {
                    log.innerHTML += (bit === "1") ? "█" : "░";
                } else if (mode === "keymap") {
                    bitBuffer += bit;
                    if (bitBuffer.length === 16) {
                        const charCode = parseInt(bitBuffer, 2);
                        const matchedKey = customKeymap[charCode];
                        
                        if (matchedKey) {
                            log.innerHTML += `<span style="color:#fff; background:#00f; padding:2px 5px; margin:2px; border-radius:3px;">[${matchedKey}]</span> `;
                        } else {
                            log.innerHTML += `<span style="color:#888;">[UNK:${charCode}]</span> `;
                        }
                        bitBuffer = ""; 
                    }
                } else {
                    bitBuffer += bit;
                    if (bitBuffer.length === 8) {
                        const charCode = parseInt(bitBuffer, 2);
                        if (mode === "decode") {
                            log.appendChild(document.createTextNode((charCode >= 32 && charCode <= 126) ? String.fromCharCode(charCode) : "."));
                        } else if (mode === "hex") {
                            log.innerHTML += charCode.toString(16).toUpperCase().padStart(2, '0') + " ";
                        } else if (mode === "dec") {
                            log.innerHTML += charCode.toString(10) + " ";
                        }
                        bitBuffer = ""; 
                    }
                }
                log.scrollTop = log.scrollHeight;
                lastCaptureTime = timestamp;
            }
            animationFrameId = requestAnimationFrame(captureFrame);
        }

        // --- Export Text (Fixed Encoding) ---
        saveBtn.addEventListener('click', () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            let outputText = "";
            const mode = displayMode.value;

            if (mode === "block") {
                for (let i = 0; i < fullMemoryBuffer.length; i++) {
                    outputText += (fullMemoryBuffer[i] === "1") ? "█" : "░";
                }
            } else if (mode === "keymap") {
                for (let i = 0; i < fullMemoryBuffer.length; i += 16) {
                    let byteStr = fullMemoryBuffer.substring(i, i + 16);
                    if (byteStr.length === 16) {
                        let charCode = parseInt(byteStr, 2);
                        let matchedKey = customKeymap[charCode];
                        outputText += matchedKey ? `[${matchedKey}] ` : `[UNK:${charCode}] `;
                    }
                }
            } else if (mode === "hex" || mode === "dec" || mode === "decode") {
                for (let i = 0; i < fullMemoryBuffer.length; i += 8) {
                    let byteStr = fullMemoryBuffer.substring(i, i + 8);
                    if (byteStr.length === 8) {
                        let charCode = parseInt(byteStr, 2);
                        if (mode === "hex") {
                            outputText += charCode.toString(16).toUpperCase().padStart(2, '0') + " ";
                        } else if (mode === "dec") {
                            outputText += charCode.toString(10) + " ";
                        } else if (mode === "decode") {
                            outputText += (charCode >= 32 && charCode <= 126) ? String.fromCharCode(charCode) : ".";
                        }
                    }
                }
            } else {
                outputText = fullMemoryBuffer; 
            }

            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, outputText], { type: "text/plain;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `ir_capture_${Math.floor(Date.now()/1000)}.txt`;
            a.click();
        });

        // --- Export WAV Generator ---
        wavBtn.addEventListener('click', () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            const sampleRate = 44100;
            const bitDurationMs = captureDelay > 0 ? captureDelay : 50; 
            const samplesPerBit = Math.floor(sampleRate * (bitDurationMs / 1000));
            const totalSamples = fullMemoryBuffer.length * samplesPerBit;
            const audioData = new Float32Array(totalSamples);

            for (let i = 0; i < fullMemoryBuffer.length; i++) {
                const bit = fullMemoryBuffer[i];
                const freq = (bit === '1') ? 1200 : 400; 
                const angularFreq = 2 * Math.PI * freq / sampleRate;
                const offset = i * samplesPerBit;
                
                for (let j = 0; j < samplesPerBit; j++) {
                    audioData[offset + j] = Math.sign(Math.sin(angularFreq * j)) * 0.5;
                }
            }

            const buffer = new ArrayBuffer(44 + audioData.length * 2);
            const view = new DataView(buffer);
            
            const writeString = (v, offset, str) => {
                for (let i = 0; i < str.length; i++) v.setUint8(offset + i, str.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + audioData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, audioData.length * 2, true);

            let offset = 44;
            for (let i = 0; i < audioData.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, audioData[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            const blob = new Blob([view], { type: 'audio/wav' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `ir_${Math.floor(Date.now()/1000)}.wav`;
            a.click();
        });

        // --- Export Video Generator ---
        vidBtn.addEventListener('click', async () => {
            if (!fullMemoryBuffer) return alert("Memory is empty!");
            
            renderOverlay.style.display = 'flex';

            const bitDurationMs = captureDelay > 0 ? captureDelay : 50; 
            
            const offCanvas = document.createElement('canvas');
            offCanvas.width = 640;
            offCanvas.height = 480;
            const offCtx = offCanvas.getContext('2d');
            
            const renderStream = offCanvas.captureStream(30);
            const recorder = new MediaRecorder(renderStream, { mimeType: 'video/webm' });
            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `ir_flicker_${Math.floor(Date.now()/1000)}.mp4`;
                a.click();
                renderOverlay.style.display = 'none';
            };
            
            recorder.start();

            const drawFrame = (color) => {
                offCtx.fillStyle = color;
                offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
            };

            drawFrame('black');
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < fullMemoryBuffer.length; i++) {
                drawFrame(fullMemoryBuffer[i] === '1' ? 'white' : 'black');
                await new Promise(r => setTimeout(r, bitDurationMs));
            }

            drawFrame('black');
            await new Promise(r => setTimeout(r, 1000));

            recorder.stop();
        });

    </script>
</body>
</html>
